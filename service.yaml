name: sample-service
application: sample-application
team: team-platform
description: Sample service for IDP E2E validation
ci:
  autoCommitDev: true
port: 8080
healthCheck:
  liveness: /healthz
  readiness: /readyz
metrics:
  enabled: true
  path: /metrics
exposure:
  type: none
  host: sample-service.example.com
config:
  default:
    LOG_LEVEL: info
  overrides:
    dev:
      LOG_LEVEL: debug
secrets:
  - DUMMY_SECRET
environments:
  dev:
    replicas: 1
    resources:
      cpu: 25m/100m
      memory: 32Mi/64Mi
  staging:
    replicas: 1
    resources:
      cpu: 50m/200m
      memory: 64Mi/128Mi
  prod:
    replicas: 2
    resources:
      cpu: 100m/500m
      memory: 128Mi/256Mi
