name: promote

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Environment to promote to
        required: true
        type: choice
        options:
          - staging
          - prod
      image:
        description: Full image ref to promote
        required: true
        type: string

permissions:
  contents: read

env:
  GITOPS_REPO: mohamediag/infra-homelab-k8s-terraform-ansible-cilium
  GITOPS_BRANCH: main

jobs:
  promote:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITOPS_TOKEN }}
      APP_REPO_PATH: ${{ github.workspace }}/app-repo
      GITOPS_REPO_PATH: ${{ github.workspace }}/gitops-repo
    steps:
      - name: Checkout app repo
        uses: actions/checkout@v4
        with:
          path: app-repo
          fetch-depth: 0

      - name: Checkout GitOps repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.GITOPS_REPO }}
          ref: ${{ env.GITOPS_BRANCH }}
          token: ${{ secrets.GITOPS_TOKEN }}
          path: gitops-repo
          fetch-depth: 0

      - name: Setup Go for generator
        uses: actions/setup-go@v5
        with:
          go-version-file: gitops-repo/tools/generator/go.mod
          cache-dependency-path: gitops-repo/tools/generator/go.sum
          cache: true

      - name: Generate promoted environment
        shell: bash
        working-directory: gitops-repo/tools/generator
        run: |
          go run ./cmd/generator \
            --service "$APP_REPO_PATH/service.yaml" \
            --gitops-repo "$GITOPS_REPO_PATH" \
            --image-tag "${{ inputs.image }}" \
            --env "${{ inputs.environment }}"

      - name: Open promotion PR
        shell: bash
        working-directory: gitops-repo
        run: |
          if git diff --quiet; then
            echo "No GitOps changes generated."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          service_name=$(go -C tools/generator run ./cmd/generator --service "$APP_REPO_PATH/service.yaml" --gitops-repo "$GITOPS_REPO_PATH" --image-tag "${{ inputs.image }}" --env "${{ inputs.environment }}" --print-service-name)
          short_image="$(basename "${{ inputs.image }}")"
          branch="promote/${service_name}-${{ inputs.environment }}-${short_image//:/-}"

          git checkout -b "$branch"
          git add -A -- "platform-tenants-apps-${{ inputs.environment }}"
          git commit -m "chore(${service_name}): promote to ${{ inputs.environment }}"
          git push -u origin "$branch"

          if gh pr view "$branch" --repo "$GITOPS_REPO" >/dev/null 2>&1; then
            echo "PR already exists for $branch"
          else
            gh pr create \
              --repo "$GITOPS_REPO" \
              --base "$GITOPS_BRANCH" \
              --head "$branch" \
              --title "chore(${service_name}): promote to ${{ inputs.environment }}" \
              --body "Promotes ${service_name} to ${{ inputs.environment }} with image ${{ inputs.image }} from ${GITHUB_REPOSITORY}@${GITHUB_SHA}."
          fi
